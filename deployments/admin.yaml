apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: streamnxt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      nodeSelector:
        kubernetes.io/hostname: streamnxt-production-worker-frontend
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: admin
          image: ghcr.io/streamnxtplus-oss/ott-admin:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: API_INTERNAL_URL
              value: "http://api:3001"
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: NEXT_PUBLIC_WS_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5