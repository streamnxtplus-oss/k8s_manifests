apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: streamnxt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api
    spec:
      nodeSelector:
        kubernetes.io/hostname: streamnxt-production-worker-api
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api
          image: ghcr.io/streamnxtplus-oss/ott-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: JWT_EXPIRES_IN
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: JWT_REFRESH_SECRET
            - name: JWT_REFRESH_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: JWT_REFRESH_EXPIRES_IN
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: ENCRYPTION_KEY
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_ENDPOINT
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_REGION
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_SECRET_KEY
            - name: S3_BUCKET_CONTENT
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_BUCKET_CONTENT
            - name: S3_BUCKET_THUMBNAILS
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_BUCKET_THUMBNAILS
            - name: S3_BUCKET_SUBTITLES
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_BUCKET_SUBTITLES
            - name: S3_PUBLIC_URL
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_PUBLIC_URL
            - name: AD_SERVER_URL
              value: "http://ad-server:3004"
            - name: AD_SERVER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: AD_SERVER_API_KEY
            - name: SERVICE_URL_WEB
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: SERVICE_URL_WEB
            - name: SERVICE_URL_ADMIN
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: SERVICE_URL_ADMIN
            - name: SERVICE_URL_SUPER_ADMIN
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: SERVICE_URL_SUPER_ADMIN
            - name: SWAGGER_ENABLED
              value: "false"
            - name: TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: TENANT_ID
            - name: DEPLOYMENT_TIER
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: DEPLOYMENT_TIER
          # startupProbe gates liveness/readiness during slow boots —
          # the API runs `prisma migrate deploy` + a migrations baseline
          # pass before it starts listening on :3001. On a cold start
          # this takes 60-120 s; with the old 30 s liveness grace the
          # pod was being SIGKILL'd mid-baseline and the rollout would
          # stall. 60 attempts × 5 s = 5 min budget; once /health
          # answers once, the regular probes below take over.
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
