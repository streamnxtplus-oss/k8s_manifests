apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-server
  namespace: streamnxt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ad-server
  template:
    metadata:
      labels:
        app: ad-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: streamnxt-production-worker-ads
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ad-server
          image: ghcr.io/streamnxtplus-oss/ott-ad-server:latest
          ports:
            - containerPort: 3004
          env:
            - name: NODE_ENV
              value: "production"
            - name: AD_SERVER_PORT
              value: "3004"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: AD_SERVER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: AD_SERVER_API_KEY
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_ENDPOINT
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_REGION
            - name: S3_BUCKET
              value: "ott-content"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_SECRET_KEY
            - name: S3_PUBLIC_URL
              valueFrom:
                secretKeyRef:
                  name: streamnxt-secrets
                  key: S3_PUBLIC_URL
            - name: SWAGGER_ENABLED
              value: "false"
